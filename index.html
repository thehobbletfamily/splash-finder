<style>
  :root {

  .logo-text { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }

  .ripple-bg:nth-child(3) { width: 60px; height: 60px; bottom: 45px; right: 30px; animation-delay: 1.6s; }
  @keyframes ripple { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.08); opacity: 0.2; } }
  .controls { padding: 16px 16px 8px; }
  .search-box { display: flex; align-items: center; background: #fff; border: 2px solid var(--border); border-radius: 14px; padding: 10px 14px; gap: 8px; box-shadow: 0 2px 12px rgba(58,183,232,0.1); margin-bottom: 12px; }
  .search-box input { border: none; outline: none; font-family: 'Nunito', sans-serif; font-size: 15px; color: var(--text); width: 100%; background: transparent; }
  .search-box input::placeholder { color: var(--muted); }
  .filter-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-chip { display: flex; align-items: center; gap: 5px; padding: 7px 14px; border-radius: 50px; border: 2px solid var(--border); background: #fff; font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700; color: var(--muted); white-space: nowrap; cursor: pointer; transition: all 0.2s; }
  .filter-chip.active { background: var(--water); border-color: var(--water); color: #fff; }
  .tab-nav { display: flex; background: #fff; border-bottom: 2px solid var(--border); }
  .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
  .tab-btn.active { color: var(--water); border-bottom-color: var(--water); }
  .list-view { padding: 12px 16px; display: flex; flex-direction: column; gap: 12px; }
  .pad-card { background: var(--card); border-radius: 18px; overflow: hidden; border: 2px solid var(--border); box-shadow: 0 2px 16px rgba(26,111,163,0.07); cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; animation: fadeUp 0.3s ease both; }
  .pad-card:active { transform: scale(0.98); }
  .pad-card.hidden { display: none; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .card-header { display: flex; align-items: flex-start; justify-content: space-between; padding: 14px 14px 8px; gap: 8px; }
  .card-city-badge { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; padding: 3px 8px; border-radius: 50px; background: var(--tag-bg); color: var(--deep); }
  .card-name { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 700; color: var(--text); line-height: 1.2; flex: 1; }
  .open-badge { font-size: 11px; font-weight: 800; padding: 4px 10px; border-radius: 50px; white-space: nowrap; }
  .open-badge.open { background: #e6f9ef; color: #2a9d5c; }
  .open-badge.closed { background: #fff0f0; color: var(--coral); }
  .card-address { padding: 0 14px 10px; font-size: 13px; color: var(--muted); font-weight: 600; }
  .card-hours { padding: 0 14px 10px; font-size: 13px; color: var(--text); font-weight: 700; display: flex; align-items: center; gap: 6px; }
  .card-hours span { color: var(--muted); font-weight: 600; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 14px 14px; }
  .tag { display: flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 800; padding: 4px 9px; border-radius: 50px; background: var(--tag-bg); color: var(--deep); }
  .tag.green { background: #e6f9ef; color: #2a9d5c; }
  .tag.yellow { background: #fff8e6; color: #c8820a; }
  .tag.red { background: #fff0f0; color: var(--coral); }
  .tag.gray { background: #f0f4f8; color: var(--muted); }
  .county-divider { padding: 16px 16px 4px; display: flex; align-items: center; gap: 10px; }
  .county-divider span { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; color: var(--deep); background: var(--tag-bg); padding: 4px 12px; border-radius: 50px; white-space: nowrap; }
  .county-divider::after { content: ''; flex: 1; height: 1.5px; background: var(--border); }
  .detail-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(26,43,60,0.5); z-index: 100; display: none; align-items: flex-end; backdrop-filter: blur(4px); }
  .detail-overlay.visible { display: flex; }
  .detail-panel { background: var(--foam); width: 100%; max-height: 90vh; border-radius: 24px 24px 0 0; overflow-y: auto; animation: slideUp 0.3s ease; }

function getStatusBadge(pad) {
  const now = new Date();
  const month = now.getMonth();
  const hour = now.getHours();
  // Season check
  const isSummer = month >= 4 && month <= 8;
  // Channahon open through Oct 1
  const isExtended = pad.id === 18 && (month >= 4 && month <= 8);
  if (!isSummer && !isExtended) return { text: 'Closed for Season', cls: 'closed' };
  if (pad.hours === 'Open daily' || pad.hours === 'Dawn – Dusk') return { text: 'Open Now', cls: 'open' };
  const match = pad.hours.match(/(\d+):(\d+)(am|pm)\s*[–-]\s*(\d+):(\d+)(am|pm)/i);
  if (match) {
    let openH = parseInt(match[1]); if (match[3].toLowerCase() === 'pm' && openH !== 12) openH += 12;
    let closeH = parseInt(match[4]); if (match[6].toLowerCase() === 'pm' && closeH !== 12) closeH += 12;
    if (hour >= openH && hour < closeH) return { text: 'Open Now', cls: 'open' };
  }
  return { text: 'Closed Today', cls: 'closed' };
}

function boolTag(val, trueLabel, trueClass, falseLabel, falseClass) {
  if (val === null || val === undefined) return `<span class="tag gray">❓ Unknown</span>`;
  if (val) return `<span class="tag ${trueClass}">${trueLabel}</span>`;
  return `<span class="tag ${falseClass}">${falseLabel}</span>`;
}

          <div class="card-name">${pad.name}</div>
        </div>
        <span class="open-badge ${status.cls}">${status.text}</span>
      </div>
      <div class="card-address">📍 ${pad.address}</div>
      <div class="card-hours">🕐 <span>${pad.hours}</span></div>
      <div class="card-tags">
        ${pad.free ? '<span class="tag green">✅ Free</span>' : '<span class="tag yellow">💰 Paid</span>'}
        ${boolTag(pad.fenced, '🔒 Fenced', 'green', '🔓 Not Fenced', 'red')}
        ${boolTag(pad.restrooms, '🚻 Restrooms', 'green', '🚫 No Restrooms', 'red')}
        ${boolTag(pad.shade, '🌳 Shade', 'green', '☀️ No Shade', 'yellow')}
        ${pad.toddler ? '<span class="tag green">👶 Toddler OK</span>' : ''}
        ${pad.parking ? '<span class="tag green">🅿️ Parking</span>' : ''}
      </div>
    </div>`;
}

function filterPads() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  let visible = 0;
  splashPads.forEach(pad => {
    const matchSearch = pad.name.toLowerCase().includes(query) || pad.city.toLowerCase().includes(query) || pad.county.toLowerCase().includes(query);
    let matchFilter = true;
    if (activeFilter === 'restrooms') matchFilter = pad.restrooms === true;
    else if (activeFilter === 'fenced') matchFilter = pad.fenced === true;
    else if (activeFilter === 'free') matchFilter = pad.free === true;
    else if (activeFilter === 'toddler') matchFilter = pad.toddler === true;
    else if (activeFilter === 'shade') matchFilter = pad.shade === true;
    else if (activeFilter === 'parking') matchFilter = pad.parking === true;
    const show = matchSearch && matchFilter;
    const card = document.getElementById(`card-${pad.id}`);
    const mapCard = document.getElementById(`map-card-${pad.id}`);
    if (card) card.classList.toggle('hidden', !show);
    if (mapCard) mapCard.classList.toggle('hidden', !show);
    if (show) visible++;
  });
  countyOrder.forEach(county => {
    const divId = `divider-${county.replace(/\s+/g, '-')}`;
    const mapDivId = `map-divider-${county.replace(/\s+/g, '-')}`;
    const anyVisible = splashPads.filter(p => p.county === county).some(p => {
      const ms = p.name.toLowerCase().includes(query) || p.city.toLowerCase().includes(query) || p.county.toLowerCase().includes(query);
      let mf = true;
      if (activeFilter === 'restrooms') mf = p.restrooms === true;
      else if (activeFilter === 'fenced') mf = p.fenced === true;
      else if (activeFilter === 'free') mf = p.free === true;
      else if (activeFilter === 'toddler') mf = p.toddler === true;
      else if (activeFilter === 'shade') mf = p.shade === true;
      else if (activeFilter === 'parking') mf = p.parking === true;
      return ms && mf;
    });
    const d = document.getElementById(divId);
    const md = document.getElementById(mapDivId);
    if (d) d.style.display = anyVisible ? '' : 'none';
    if (md) md.style.display = anyVisible ? '' : 'none';
  });
  document.getElementById('resultsCount').textContent = `${visible} splash pad${visible !== 1 ? 's' : ''} found`;
}

function setFilter(filter, btn) {
  activeFilter = filter;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  filterPads();
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(tab === 'list' ? 'listView' : 'mapView').classList.add('active');
}

function openDetail(id) {
  const pad = splashPads.find(p => p.id === id);
  if (!pad) return;
  document.getElementById('detailName').textContent = pad.name;
  document.getElementById('detailCity').textContent = `📍 ${pad.city}, IL · ${pad.county}`;
  document.getElementById('detailBody').innerHTML = `
    <div class="detail-section">
      <div class="detail-section-title">Hours & Season</div>
      <div class="detail-info-row"><span class="detail-info-icon">🕐</span><span class="detail-info-label">Daily Hours</span><span class="detail-info-value">${pad.hours}</span></div>
      <div class="detail-info-row"><span class="detail-info-icon">📅</span><span class="detail-info-label">Season</span><span class="detail-info-value">${pad.season}</span></div>
      <div class="detail-info-row"><span class="detail-info-icon">👦</span><span class="detail-info-label">Age Range</span><span class="detail-info-value">${pad.ageRange}</span></div>
      <div class="detail-info-row"><span class="detail-info-icon">💵</span><span class="detail-info-label">Admission</span><span class="detail-info-value" style="color:${pad.free ? '#2a9d5c' : '#c8820a'}">${pad.free ? 'Free' : 'Paid'}</span></div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">Amenities</div>
      <div class="detail-amenities">
        ${pad.fenced === true ? '<div class="detail-amenity">🔒 Fenced In</div>' : pad.fenced === false ? '<div class="detail-amenity" style="opacity:0.5">🔓 Not Fenced</div>' : '<div class="detail-amenity" style="opacity:0.5">🔒 Fencing Unknown</div>'}
        ${pad.restrooms === true ? '<div class="detail-amenity">🚻 Restrooms</div>' : pad.restrooms === false ? '<div class="detail-amenity" style="opacity:0.5">🚫 No Restrooms</div>' : '<div class="detail-amenity" style="opacity:0.5">🚻 Restrooms Unknown</div>'}
        ${pad.shade === true ? '<div class="detail-amenity">🌳 Shade Available</div>' : pad.shade === false ? '<div class="detail-amenity" style="opacity:0.5">☀️ No Shade</div>' : ''}
        ${pad.toddler ? '<div class="detail-amenity">👶 Toddler Friendly</div>' : ''}
        ${pad.parking ? '<div class="detail-amenity">🅿️ Free Parking</div>' : ''}
        <div class="detail-amenity">🌊 Park Adjacent</div>
      </div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">About This Park</div>
      <div style="background:#fff;border-radius:12px;padding:14px;border:1.5px solid var(--border);font-size:14px;line-height:1.6;color:var(--text);font-weight:600;">${pad.notes}</div>
    </div>
    <button class="directions-btn" onclick="getDirections(${pad.id})">🗺️ Get Directions</button>`;
  document.getElementById('detailOverlay').classList.add('visible');
}

function closeDetail(e) { if (e.target === document.getElementById('detailOverlay')) document.getElementById('detailOverlay').classList.remove('visible'); }
function closeDetailBtn() { document.getElementById('detailOverlay').classList.remove('visible'); }
function getDirections(id) {
  const pad = splashPads.find(p => p.id === id);
  if (pad) window.open(`https://maps.google.com/?q=${encodeURIComponent(pad.address)}`, '_blank');
}

function init() {
  const listEl = document.getElementById('padList');
  const mapListEl = document.getElementById('mapCardList');
  countyOrder.forEach(county => {
    const countyPads = splashPads.filter(p => p.county === county);
    if (!countyPads.length) return;
    const divId = `divider-${county.replace(/\s+/g, '-')}`;
    const divider = `<div class="county-divider" id="${divId}"><span>${county}</span></div>`;
    listEl.innerHTML += divider;
    mapListEl.innerHTML += divider.replace(divId, `map-${divId}`);
    countyPads.forEach(pad => {
      listEl.innerHTML += renderCard(pad);
      mapListEl.innerHTML += `<div id="map-card-${pad.id}">${renderCard(pad, 'map-')}</div>`;
    });
  });
  filterPads();
}

init();
</script>
</body>
</html>
